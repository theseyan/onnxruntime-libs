name: aarch64-shared-228

on:
  push:
    branches:
      - test-v1.23.2-2
  workflow_dispatch:
    inputs:
      version:
        description: "Version information (e.g., 1.23.2)"
        required: true

permissions:
  contents: write

env:
  ONNXRUNTIME_VERSION:
    |- # Enter release tag name or version name in workflow_dispatch. Appropriate version if not specified
    ${{ github.event.release.tag_name || github.event.inputs.version || '1.23.2' }}

jobs:
  aarch64-shared-228:
    name: ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04-arm]
        arch: [aarch64]
        config: ['Debug', 'MinSizeRel', 'Release', 'RelWithDebInfo']
        # config: ['MinSizeRel', 'Release']
        # config: ['Release']

    steps:
      - name: Cache build result for ${{ env.ONNXRUNTIME_VERSION }}
        id: cache-build-result
        uses: actions/cache@v4
        with:
          path: onnxruntime-linux-${{ matrix.arch }}-glibc2_28-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-linux-${{ matrix.arch }}-glibc2_28-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}-cache-v1

      - name: Checkout v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          submodules: true
          ref: v${{ env.ONNXRUNTIME_VERSION }}

      - name: Set up Zig 0.16
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Expose Zig toolchain to Docker
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zig_bin=$(realpath "$(command -v zig)")
          zig_root=$(dirname "$zig_bin")
          rm -rf .zig-toolchain
          mkdir -p .zig-toolchain
          cp -a "$zig_root"/. .zig-toolchain/
          ./.zig-toolchain/zig version

      - name: patch
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          sed -i.bak '/SOVERSION/d' ./cmake/onnxruntime.cmake
          sed -i.bak '/onnxruntime PROPERTIES VERSION/d' ./cmake/onnxruntime.cmake
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "check_cxx_compiler_flag(-march=armv8.2-a+bf16 HAS_ARM64_BFLOAT16)": "check_cxx_compiler_flag(-mcpu=baseline+bf16 HAS_ARM64_BFLOAT16)",
              "check_cxx_compiler_flag(-march=armv8.2-a+fp16 HAS_ARM64_FLOAT16)": "check_cxx_compiler_flag(-mcpu=baseline+fullfp16 HAS_ARM64_FLOAT16)",
          }
          path = Path("cmake/CMakeLists.txt")
          text = path.read_text()
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"Could not find expected compiler probe: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)

          replacements = {
              "-march=armv8.2-a+dotprod": "-mcpu=baseline+dotprod",
              "-march=armv8.2-a+i8mm": "-mcpu=baseline+i8mm",
              "-march=armv8.2-a+bf16": "-mcpu=baseline+bf16",
              "-march=armv8.2-a+fp16": "-mcpu=baseline+fullfp16",
              "-march=armv8.2-a+sve+fp16": "-mcpu=baseline+sve+fullfp16",
          }
          path = Path("cmake/onnxruntime_mlas.cmake")
          text = path.read_text()
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"Could not find expected MLAS compiler flag: {old}")
              text = text.replace(old, new)
          path.write_text(text)
          PY

          git diff

          sudo apt-get install -y patchelf

      - name: Build onnxruntime ${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: addnab/docker-run-action@v3
        with:
            # onnxruntime v1.22.0   GCC version must be greater than or equal to 11.1
            # https://github.com/pypa/manylinux?tab=readme-ov-file#manylinux_2_28-almalinux-8-based
            #
            # https://github.com/pypa/manylinux/issues/1266
            image: quay.io/pypa/manylinux_2_28_aarch64 # onnxruntime v1.22.0 requires gcc >= 11
            # image: quay.io/pypa/manylinux2014_aarch64 # it has only gcc 10. gcc 11 cannot be installed on it
            options: |
              --volume ${{ github.workspace }}/:/shared
            shell: bash
            run: |
              echo "config: ${{ matrix.config }}"
              uname -a
              export ZIG=/shared/.zig-toolchain/zig
              export ZIG_TARGET=aarch64-linux-gnu.2.28
              "$ZIG" version

              cat > /tmp/zig-cc <<'EOF'
              #!/usr/bin/env bash
              exec /shared/.zig-toolchain/zig cc -target "${ZIG_TARGET:?}" "$@"
              EOF
              cat > /tmp/zig-c++ <<'EOF'
              #!/usr/bin/env bash
              exec /shared/.zig-toolchain/zig c++ -target "${ZIG_TARGET:?}" "$@"
              EOF
              cat > /tmp/zig-ar <<'EOF'
              #!/usr/bin/env bash
              exec /shared/.zig-toolchain/zig ar "$@"
              EOF
              cat > /tmp/zig-ranlib <<'EOF'
              #!/usr/bin/env bash
              exec /shared/.zig-toolchain/zig ranlib "$@"
              EOF
              chmod +x /tmp/zig-cc /tmp/zig-c++ /tmp/zig-ar /tmp/zig-ranlib

              export CC=/tmp/zig-cc
              export CXX=/tmp/zig-c++
              export AR=/tmp/zig-ar
              export RANLIB=/tmp/zig-ranlib

              "$CC" --version
              "$CXX" --version
              which python

              # find /opt -name "python*"

              echo "--------------------"
              PYBIN_DIR=$(find /opt/_internal -type d -path '*/cpython-3.10.*/bin' -print -quit)
              echo "PYBIN_DIR: $PYBIN_DIR"

              export PATH=$PYBIN_DIR:$PATH
              which python3
              python3 --version
              python3 -m pip install ninja

              cd /shared
              ls -lh
              touch /shared/a.txt
              mkdir build-shared

              version=${{ env.ONNXRUNTIME_VERSION }}
              which python
              # v=$(cat ./VERSION_NUMBER)
              # if [[ $v == "1.18.0" ]]; then
              #   echo $version > ./VERSION_NUMBER
              #   sed -i.bak s/1.18.0/$version/g ./onnxruntime/core/session/onnxruntime_c_api.cc
              # fi

              # echo "---$version---"
              # cat ./VERSION_NUMBER
              # echo "---"

              "$CC" --version
              which "$CC"

              "$CXX" --version
              which "$CXX"

              which python

              build_dir=/shared/build-shared

              python3 tools/ci_build/build.py \
                --cmake_extra_defines onnxruntime_BUILD_UNIT_TESTS=OFF \
                --cmake_extra_defines CMAKE_C_COMPILER=/tmp/zig-cc \
                --cmake_extra_defines CMAKE_CXX_COMPILER=/tmp/zig-c++ \
                --cmake_extra_defines CMAKE_AR=/tmp/zig-ar \
                --cmake_extra_defines CMAKE_RANLIB=/tmp/zig-ranlib \
                --cmake_extra_defines CMAKE_C_COMPILER_AR=/tmp/zig-ar \
                --cmake_extra_defines CMAKE_CXX_COMPILER_AR=/tmp/zig-ar \
                --cmake_extra_defines CMAKE_C_COMPILER_RANLIB=/tmp/zig-ranlib \
                --cmake_extra_defines CMAKE_CXX_COMPILER_RANLIB=/tmp/zig-ranlib \
                --cmake_extra_defines CMAKE_DISABLE_FIND_PACKAGE_ZLIB=ON \
                --build_dir $build_dir \
                --cmake_generator 'Ninja' \
                --config ${{ matrix.config }} \
                --update \
                --build \
                --parallel \
                --skip_tests \
                --compile_no_warning_as_error \
                --build_shared_lib \
                --skip_submodule_sync \
                --enable_lto \
                --no_kleidiai \
                --no_sve \
                --allow_running_as_root

              chmod a=rwx build-shared
              ls -lh build-shared
              ls -lh build-shared/*

      - name: Collect results
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          build_dir=./build-shared

          sudo chown -R runner $build_dir
          ls -lh $build_dir

          version=${{ env.ONNXRUNTIME_VERSION }}
          config=${{ matrix.config }}
          artifact=onnxruntime-linux-${{ matrix.arch }}-glibc2_28-$config-$version

          tag=$(git rev-parse HEAD)
          echo "tag: $tag"

          pushd ./tools/ci_build/github/linux
          rm copy_strip_binary.sh
          wget https://github.com/microsoft/onnxruntime/raw/v1.18.1/tools/ci_build/github/linux/copy_strip_binary.sh
          chmod +x copy_strip_binary.sh
          ls -lh
          popd

          ./tools/ci_build/github/linux/copy_strip_binary.sh \
            -r $build_dir \
            -a $artifact \
            -c $config \
            -l libonnxruntime.so \
            -s $PWD/ \
            -t "$(git rev-parse HEAD)"

          mv $build_dir/$artifact ./
          if [[ -d "$build_dir/$config" ]]; then
            find "$build_dir/$config" -maxdepth 1 -type f -name "*.a" -exec cp -v {} ./$artifact/lib/ \;
          fi
          tree ./$artifact

          # ldd ./$artifact/lib/libonnxruntime.so
          readelf -d ./$artifact/lib/libonnxruntime.so

          patchelf --set-soname libonnxruntime.so ./$artifact/lib/libonnxruntime.so

          # ldd ./$artifact/lib/libonnxruntime.so
          readelf -d ./$artifact/lib/libonnxruntime.so

          strings  ./$artifact/lib/libonnxruntime.so | grep "^GLIBC_"

          zip -r ${artifact}.zip ./$artifact

      - name: Upload artifact
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-linux-${{ matrix.arch }}-glibc2_28-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}
          path: onnxruntime-linux-${{ matrix.arch }}-glibc2_28-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}

      - name: Upload v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: "./*.zip"
          overwrite: true
          tag: v${{ env.ONNXRUNTIME_VERSION }}

      # https://huggingface.co/docs/hub/spaces-github-actions
      - name: Publish to huggingface
        # if: github.repository_owner == 'csukuangfj' && steps.cache-build-result.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            ls -lh
            version=${{ env.ONNXRUNTIME_VERSION }}
            config=${{ matrix.config }}
            artifact=onnxruntime-linux-${{ matrix.arch }}-glibc2_28-$config-$version

            tree ./$artifact

            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"

            export GIT_CLONE_PROTECTION_ACTIVE=false
            rm -rf huggingface
            GIT_LFS_SKIP_SMUDGE=1 git clone https://csukuangfj2:$HF_TOKEN@huggingface.co/csukuangfj2/onnxruntime-libs huggingface

            cd huggingface

            d=${{ env.ONNXRUNTIME_VERSION }}
            mkdir -p $d

            # git lfs pull
            cp -v ../onnxruntime-linux*.zip ./$d/

            git status
            git lfs track "*.zip"

            git add .

            git commit -m "upload $artifact"
            git push https://csukuangfj2:$HF_TOKEN@huggingface.co/csukuangfj2/onnxruntime-libs main
