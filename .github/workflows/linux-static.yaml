name: linux-static

on:
  push:
    branches:
      - test-v1.23.2-2
  workflow_dispatch:
    inputs:
      version:
        description: "Version information (e.g., 1.23.2)"
        required: true

permissions:
  contents: write

env:
  ONNXRUNTIME_VERSION:
    |- # Enter release tag name or version name in workflow_dispatch. Appropriate version if not specified
    ${{ github.event.release.tag_name || github.event.inputs.version || '1.23.2' }}

jobs:
  linux-static:
    name: ${{ matrix.artifact_arch }} glibc${{ matrix.glibc }} ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: ['x64-217', 'x64-228', 'aarch64-217', 'aarch64-228']
        config: ['Debug', 'MinSizeRel', 'Release', 'RelWithDebInfo']
        include:
          - target: x64-217
            os: ubuntu-latest
            artifact_arch: x64
            onnx_arch: x86_64
            glibc: '2_17'
            zig_target: x86_64-linux-gnu.2.17
            docker_image: quay.io/pypa/manylinux2014_x86_64
            protoc_platform: linux-x86_64
          - target: x64-228
            os: ubuntu-latest
            artifact_arch: x64
            onnx_arch: x86_64
            glibc: '2_28'
            zig_target: x86_64-linux-gnu.2.28
            docker_image: quay.io/pypa/manylinux_2_28_x86_64
            protoc_platform: linux-x86_64
          - target: aarch64-217
            os: ubuntu-22.04-arm
            artifact_arch: aarch64
            onnx_arch: aarch64
            glibc: '2_17'
            zig_target: aarch64-linux-gnu.2.17
            docker_image: ghcr.io/csukuangfj/manylinux2014-aarch64-gcc11:latest
            protoc_platform: linux-aarch_64
          - target: aarch64-228
            os: ubuntu-22.04-arm
            artifact_arch: aarch64
            onnx_arch: aarch64
            glibc: '2_28'
            zig_target: aarch64-linux-gnu.2.28
            docker_image: quay.io/pypa/manylinux_2_28_aarch64
            protoc_platform: linux-aarch_64

    steps:
      - name: Cache build result for ${{ env.ONNXRUNTIME_VERSION }}
        id: cache-build-result
        uses: actions/cache@v4
        with:
          path: onnxruntime-linux-${{ matrix.artifact_arch }}-glibc${{ matrix.glibc }}-static-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-linux-${{ matrix.artifact_arch }}-glibc${{ matrix.glibc }}-static-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}-cache-v1

      - name: Checkout build scripts
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Checkout ONNX Runtime v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          submodules: true
          ref: v${{ env.ONNXRUNTIME_VERSION }}
          path: onnxruntime

      - name: Set up Zig 0.16
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Expose Zig toolchain to Docker
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zig_bin=$(realpath "$(command -v zig)")
          zig_root=$(dirname "$zig_bin")
          rm -rf .zig-toolchain
          mkdir -p .zig-toolchain
          cp -a "$zig_root"/. .zig-toolchain/
          ./.zig-toolchain/zig version

      - name: Download protoc
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [[ ${{ env.ONNXRUNTIME_VERSION }} =~ 1.14.[0-9] ]]; then
            protoc_version=3.20.3
          elif [[ ${{ env.ONNXRUNTIME_VERSION }} =~ 1.1[56789].[0-9] || ${{ env.ONNXRUNTIME_VERSION }} =~ 1.2[0-9].[0-9] ]]; then
            protoc_version=21.12
          else
            echo "Unsupported version ${{ env.ONNXRUNTIME_VERSION }}"
            exit 1
          fi
          curl -L -o protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${protoc_version}/protoc-${protoc_version}-${{ matrix.protoc_platform }}.zip"
          unzip -q protoc.zip
          rm -f protoc.zip
          ./bin/protoc --version

      - name: Patch ONNX Runtime for Zig aarch64 flags
        if: steps.cache-build-result.outputs.cache-hit != 'true' && matrix.onnx_arch == 'aarch64'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "check_cxx_compiler_flag(-march=armv8.2-a+bf16 HAS_ARM64_BFLOAT16)": "check_cxx_compiler_flag(-mcpu=baseline+bf16 HAS_ARM64_BFLOAT16)",
              "check_cxx_compiler_flag(-march=armv8.2-a+fp16 HAS_ARM64_FLOAT16)": "check_cxx_compiler_flag(-mcpu=baseline+fullfp16 HAS_ARM64_FLOAT16)",
          }
          path = Path("onnxruntime/cmake/CMakeLists.txt")
          text = path.read_text()
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"Could not find expected compiler probe: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)

          replacements = {
              '${MLAS_SRC_DIR}/aarch64/HalfGemmKernelNeon.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+fp16 "': '${MLAS_SRC_DIR}/aarch64/HalfGemmKernelNeon.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+fp16 "',
              '${MLAS_SRC_DIR}/aarch64/QgemmS8S8KernelSmmla.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+i8mm "': '${MLAS_SRC_DIR}/aarch64/QgemmS8S8KernelSmmla.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+i8mm "',
              '${MLAS_SRC_DIR}/aarch64/QgemmU8X8KernelUmmla.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+i8mm "': '${MLAS_SRC_DIR}/aarch64/QgemmU8X8KernelUmmla.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+i8mm "',
              '${MLAS_SRC_DIR}/aarch64/SbgemmKernelNeon.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+bf16 "': '${MLAS_SRC_DIR}/aarch64/SbgemmKernelNeon.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+bf16 "',
              '${MLAS_SRC_DIR}/aarch64/SconvDepthwiseKernelNeonBf16.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+bf16 "': '${MLAS_SRC_DIR}/aarch64/SconvDepthwiseKernelNeonBf16.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+bf16 "',
              '${MLAS_SRC_DIR}/aarch64/SconvKernelNeonBf16.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+bf16 "': '${MLAS_SRC_DIR}/aarch64/SconvKernelNeonBf16.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+bf16 "',
              '${MLAS_SRC_DIR}/aarch64/SconvPointwiseKernelNeonBf16.S PROPERTIES COMPILE_FLAGS " -march=armv8.2-a+bf16 "': '${MLAS_SRC_DIR}/aarch64/SconvPointwiseKernelNeonBf16.S PROPERTIES COMPILE_FLAGS " -Wa,-march=armv8.2-a+bf16 "',
              'COMPILE_FLAGS " -march=armv8.2-a+dotprod"': 'COMPILE_FLAGS " -mcpu=baseline+dotprod"',
              'COMPILE_FLAGS " -march=armv8.2-a+i8mm "': 'COMPILE_FLAGS " -mcpu=baseline+i8mm "',
              'COMPILE_FLAGS " -march=armv8.2-a+bf16 "': 'COMPILE_FLAGS " -mcpu=baseline+bf16 "',
              'COMPILE_FLAGS " -march=armv8.2-a+fp16 "': 'COMPILE_FLAGS " -mcpu=baseline+fullfp16 "',
              'COMPILE_FLAGS " -march=armv8.2-a+sve+fp16 "': 'COMPILE_FLAGS " -mcpu=baseline+sve+fullfp16 "',
          }
          path = Path("onnxruntime/cmake/onnxruntime_mlas.cmake")
          text = path.read_text()
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"Could not find expected MLAS compiler flag: {old}")
              text = text.replace(old, new)
          path.write_text(text)
          PY
          git -C onnxruntime diff

      - name: Build static onnxruntime ${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker_image }}
          options: |
            --volume ${{ github.workspace }}/:/shared
          shell: bash
          run: |
            uname -a
            export ZIG=/shared/.zig-toolchain/zig
            export ZIG_TARGET=${{ matrix.zig_target }}
            "$ZIG" version

            cat > /tmp/zig-cc <<'EOF'
            #!/usr/bin/env bash
            exec /shared/.zig-toolchain/zig cc -target "${ZIG_TARGET:?}" "$@"
            EOF
            cat > /tmp/zig-c++ <<'EOF'
            #!/usr/bin/env bash
            exec /shared/.zig-toolchain/zig c++ -target "${ZIG_TARGET:?}" "$@"
            EOF
            cat > /tmp/zig-ar <<'EOF'
            #!/usr/bin/env bash
            exec /shared/.zig-toolchain/zig ar "$@"
            EOF
            cat > /tmp/zig-ranlib <<'EOF'
            #!/usr/bin/env bash
            exec /shared/.zig-toolchain/zig ranlib "$@"
            EOF
            chmod +x /tmp/zig-cc /tmp/zig-c++ /tmp/zig-ar /tmp/zig-ranlib

            export CC=/tmp/zig-cc
            export CXX=/tmp/zig-c++
            export AR=/tmp/zig-ar
            export RANLIB=/tmp/zig-ranlib
            "$CC" --version
            "$CXX" --version

            PYBIN_DIR=$(find /opt/_internal -type d -path '*/cpython-3.10.*/bin' -print -quit)
            export PATH=$PYBIN_DIR:$PATH
            python3 --version
            python3 -m pip install ninja cmake
            cmake --version

            cd /shared
            export CMAKE_BUILD_TYPE=${{ matrix.config }}
            export ONNXRUNTIME_SOURCE_DIR=onnxruntime
            export CMAKE_OPTIONS="-Donnxruntime_BUILD_UNIT_TESTS=OFF -Donnxruntime_USE_KLEIDIAI=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DONNX_CUSTOM_PROTOC_EXECUTABLE=/shared/bin/protoc -DCMAKE_C_COMPILER=/tmp/zig-cc -DCMAKE_CXX_COMPILER=/tmp/zig-c++ -DCMAKE_AR=/tmp/zig-ar -DCMAKE_RANLIB=/tmp/zig-ranlib -DCMAKE_C_COMPILER_AR=/tmp/zig-ar -DCMAKE_CXX_COMPILER_AR=/tmp/zig-ar -DCMAKE_C_COMPILER_RANLIB=/tmp/zig-ranlib -DCMAKE_CXX_COMPILER_RANLIB=/tmp/zig-ranlib -DCMAKE_DISABLE_FIND_PACKAGE_ZLIB=ON"
            ./build-static_lib.sh

      - name: Collect results
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          sudo chown -R runner output build || true

          version=${{ env.ONNXRUNTIME_VERSION }}
          config=${{ matrix.config }}
          artifact=onnxruntime-linux-${{ matrix.artifact_arch }}-glibc${{ matrix.glibc }}-static-$config-$version

          test -f output/static_lib/lib/libonnxruntime.a
          mkdir "$artifact"
          cp -av output/static_lib/* "$artifact"/
          cp -v onnxruntime/README.md "$artifact"/README.md
          cp -v onnxruntime/docs/Privacy.md "$artifact"/Privacy.md
          cp -v onnxruntime/LICENSE "$artifact"/LICENSE
          cp -v onnxruntime/ThirdPartyNotices.txt "$artifact"/ThirdPartyNotices.txt
          cp -v onnxruntime/VERSION_NUMBER "$artifact"/VERSION_NUMBER
          git -C onnxruntime rev-parse HEAD > "$artifact"/GIT_COMMIT_ID

          find "$artifact/lib" -name '*.a' -print0 | while IFS= read -r -d '' archive; do
            echo "Validating $archive"
            member_count=$(ar t "$archive" | wc -l)
            test "$member_count" -gt 0
            while IFS= read -r member; do
              kind=$(ar p "$archive" "$member" | file -)
              if grep -q 'LLVM IR bitcode' <<<"$kind"; then
                echo "LLVM bitcode member found in $archive: $member"
                exit 1
              fi
              if ! grep -Eq 'ELF .* relocatable' <<<"$kind"; then
                echo "Unexpected non-ELF archive member in $archive: $member ($kind)"
                exit 1
              fi
            done < <(ar t "$archive")
          done

          zip -r ${artifact}.zip "$artifact"

      - name: Upload artifact
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-linux-${{ matrix.artifact_arch }}-glibc${{ matrix.glibc }}-static-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}
          path: onnxruntime-linux-${{ matrix.artifact_arch }}-glibc${{ matrix.glibc }}-static-${{ matrix.config }}-${{ env.ONNXRUNTIME_VERSION }}

      - name: Upload v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: "./*.zip"
          overwrite: true
          tag: v${{ env.ONNXRUNTIME_VERSION }}
