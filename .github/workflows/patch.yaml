name: patch

on:
  push:
    branches:
      - patchelf

  workflow_dispatch:
    inputs:
      version:
        description: "Version information (e.g., 1.22.0)"
        required: true

permissions:
  contents: write

env:
  ONNXRUNTIME_VERSION:
    |- # Enter release tag name or version name in workflow_dispatch. Appropriate version if not specified
    ${{ github.event.release.tag_name || github.event.inputs.version || '1.22.0' }}

jobs:
  patchelf:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install
        shell: bash
        run: |
          sudo apt-get install -y patchelf zip

      - name: Run
        shell: bash
        run: |
          cd .github/scripts
          ./patchelf.sh

      - name: Show sha256sum
        shell: bash
        run: |
          ls -lh *.zip
          shasum -a 256 ./*.zip

      - name: Upload v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: "./*.zip"
          overwrite: true
          tag: v${{ env.ONNXRUNTIME_VERSION }}
