name: windows-x64

on:
  push:
    branches:
      - win-crt
  workflow_dispatch:
    inputs:
      version:
        description: "Version information (e.g., 1.23.2)"
        required: true

permissions:
  contents: write

env:
  ONNXRUNTIME_VERSION:
    |- # Enter release tag name or version name in workflow_dispatch. Appropriate version if not specified
    ${{ github.event.release.tag_name || github.event.inputs.version || '1.23.2' }}

jobs:
  windows_x64:
    if: true
    name: x64 msvc ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: ["Debug", "MinSizeRel", "Release", "RelWithDebInfo"]

    steps:
      - name: Cache build result for ${{ env.ONNXRUNTIME_VERSION }}
        id: cache-build-result
        uses: actions/cache@v4
        with:
          path: onnxruntime-win-x64-msvc-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-win-x64-msvc-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}-cache-v1

      - name: Checkout v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          submodules: true
          ref: v${{ env.ONNXRUNTIME_VERSION }}

      - name: Install dependencies on Windows
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python3 -m pip install cmake
          cmake --version

      - name: Build onnxruntime ${{ env.ONNXRUNTIME_VERSION }} for Win64
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          build_dir=./build/windows_x64
          python3 ./tools/ci_build/build.py \
            --compile_no_warning_as_error \
            --build_dir $build_dir \
            --config ${{ matrix.build_type }} \
            --parallel \
            --cmake_generator "Visual Studio 17 2022" \
            --skip_tests \
            --build_shared_lib \
            --disable_memleak_checker \
            --update \
            --build

      - name: Setup tmate session
        if: false
        uses: mxschmitt/action-tmate@v3

      - name: Copy results
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |

          build_dir=./build/windows_x64
          version=${{ env.ONNXRUNTIME_VERSION }}

          mkdir tmp
          cd tmp
          curl -SL -O https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip
          unzip onnxruntime-win-x64-$version.zip
          ls -lh onnxruntime-win-x64-$version
          cd ..

          src=tmp/onnxruntime-win-x64-$version

          dst_dir=onnxruntime-win-x64-msvc-${{ matrix.build_type }}-$version

          mkdir -p $dst_dir
          mkdir -p $dst_dir/lib

          echo "copy libs"

          build_output=$build_dir/${{ matrix.build_type }}
          if [[ -d $build_output/${{ matrix.build_type }} ]]; then
            build_output=$build_output/${{ matrix.build_type }}
          fi

          find "$build_output" -maxdepth 1 -type f \( -name "*.dll" -o -name "*.lib" -o -name "*.exp" -o -name "*.pdb" \) -exec cp -v {} $dst_dir/lib/ \;

          ls -lh $dst_dir/lib

          echo "copy headers"

          mkdir $dst_dir/include

          cp -v $src/include/*.h $dst_dir/include

          echo "copy other files"

          cp -v $src/GIT_COMMIT_ID $dst_dir/
          cp -v $src/LICENSE $dst_dir/
          cp -v $src/Privacy.md $dst_dir/
          cp -v $src/README.md $dst_dir/
          cp -v $src/ThirdPartyNotices.txt $dst_dir/
          cp -v $src/VERSION_NUMBER $dst_dir/

          python3 -m zipfile -c ${dst_dir}.zip $dst_dir

      - name: Upload artifact
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-win-x64-msvc-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}
          path: onnxruntime-win-x64-msvc-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}

      - name: Upload v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: "./*.zip"
          overwrite: true
          tag: v${{ env.ONNXRUNTIME_VERSION }}
