name: windows-x64

on:
  push:
    branches:
      - win-crt
  workflow_dispatch:
    inputs:
      version:
        description: "Version information (e.g., 1.23.2)"
        required: true

permissions:
  contents: write

env:
  ONNXRUNTIME_VERSION:
    |- # Enter release tag name or version name in workflow_dispatch. Appropriate version if not specified
    ${{ github.event.release.tag_name || github.event.inputs.version || '1.23.2' }}

jobs:
  windows_x64:
    if: true
    name: x64 mingw ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: ["Debug", "MinSizeRel", "Release", "RelWithDebInfo"]

    steps:
      - name: Cache build result for ${{ env.ONNXRUNTIME_VERSION }}
        id: cache-build-result
        uses: actions/cache@v4
        with:
          path: onnxruntime-win-x64-mingw-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-win-x64-mingw-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}-cache-v1

      - name: Checkout v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          submodules: true
          ref: v${{ env.ONNXRUNTIME_VERSION }}

      - name: Set up Zig 0.16
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies on Windows
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python3 -m pip install cmake ninja
          cmake --version
          ninja --version

      - name: Patch ONNX Runtime for MinGW
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("cmake/CMakeLists.txt")
          text = path.read_text()
          old = "set(ORT_WARNING_FLAGS)\nif (WIN32)"
          new = "set(ORT_WARNING_FLAGS)\nif (MSVC)"
          if old not in text:
              raise RuntimeError(f"Could not find ORT warning flag block in {path}")
          path.write_text(text.replace(old, new, 1))

          path = Path("include/onnxruntime/core/common/status.h")
          text = path.read_text()
          old = "#include <winerror.h>"
          new = "#include <windows.h>"
          if old not in text:
              raise RuntimeError(f"Could not find Windows error include in {path}")
          path.write_text(text.replace(old, new, 1))

          path = Path("cmake/onnxruntime_common.cmake")
          text = path.read_text()
          old = 'target_compile_options(onnxruntime_common PRIVATE "/Zc:char8_t-")'
          new = '''if(MSVC)
              target_compile_options(onnxruntime_common PRIVATE "/Zc:char8_t-")
            endif()'''
          if old not in text:
              raise RuntimeError(f"Could not find MSVC char8_t flag in {path}")
          path.write_text(text.replace(old, new, 1))

          path = Path("onnxruntime/core/common/logging/logging.cc")
          text = path.read_text()
          replacements = {
              "#ifdef _WIN32\n  auto& manager = EtwRegistrationManager::Instance();": "#if defined(_WIN32) && defined(ETW_TRACE_LOGGING_SUPPORTED)\n  auto& manager = EtwRegistrationManager::Instance();",
              "#ifdef _WIN32\n  auto& manager = logging::EtwRegistrationManager::Instance();": "#if defined(_WIN32) && defined(ETW_TRACE_LOGGING_SUPPORTED)\n  auto& manager = logging::EtwRegistrationManager::Instance();",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"Could not find ETW guard in {path}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY

      - name: Build onnxruntime ${{ env.ONNXRUNTIME_VERSION }} for Win64
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          build_dir=./build/windows_x64
          target=x86_64-windows-gnu

          cat > "$RUNNER_TEMP/zig-cc.cmd" <<EOF
          @echo off
          zig cc -target $target %*
          EOF
          cat > "$RUNNER_TEMP/zig-c++.cmd" <<EOF
          @echo off
          zig c++ -target $target %*
          EOF
          cat > "$RUNNER_TEMP/zig-ar.cmd" <<'EOF'
          @echo off
          zig ar %*
          EOF
          cat > "$RUNNER_TEMP/zig-ranlib.cmd" <<'EOF'
          @echo off
          zig ranlib %*
          EOF
          cat > "$RUNNER_TEMP/zig-rc.cmd" <<'EOF'
          @echo off
          zig rc %*
          EOF

          zig_cc=$(cygpath -m "$RUNNER_TEMP/zig-cc.cmd")
          zig_cxx=$(cygpath -m "$RUNNER_TEMP/zig-c++.cmd")
          zig_ar=$(cygpath -m "$RUNNER_TEMP/zig-ar.cmd")
          zig_ranlib=$(cygpath -m "$RUNNER_TEMP/zig-ranlib.cmd")
          zig_rc=$(cygpath -m "$RUNNER_TEMP/zig-rc.cmd")
          zig version

          python3 ./tools/ci_build/build.py \
            --compile_no_warning_as_error \
            --build_dir $build_dir \
            --config ${{ matrix.build_type }} \
            --cmake_generator "Ninja" \
            --cmake_extra_defines CMAKE_SYSTEM_NAME=Windows \
            --cmake_extra_defines CMAKE_SYSTEM_PROCESSOR=x86_64 \
            --cmake_extra_defines CMAKE_C_COMPILER="$zig_cc" \
            --cmake_extra_defines CMAKE_CXX_COMPILER="$zig_cxx" \
            --cmake_extra_defines CMAKE_RC_COMPILER="$zig_rc" \
            --cmake_extra_defines CMAKE_AR="$zig_ar" \
            --cmake_extra_defines CMAKE_RANLIB="$zig_ranlib" \
            --cmake_extra_defines CMAKE_C_FLAGS="-DNOGDI" \
            --cmake_extra_defines CMAKE_CXX_FLAGS="-DNOGDI" \
            --skip_tests \
            --build_shared_lib \
            --disable_memleak_checker \
            --update \
            --build

      - name: Setup tmate session
        if: false
        uses: mxschmitt/action-tmate@v3

      - name: Copy results
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |

          build_dir=./build/windows_x64
          version=${{ env.ONNXRUNTIME_VERSION }}

          mkdir tmp
          cd tmp
          curl -SL -O https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip
          unzip onnxruntime-win-x64-$version.zip
          ls -lh onnxruntime-win-x64-$version
          cd ..

          src=tmp/onnxruntime-win-x64-$version

          dst_dir=onnxruntime-win-x64-mingw-${{ matrix.build_type }}-$version

          mkdir -p $dst_dir
          mkdir -p $dst_dir/lib

          echo "copy libs"

          build_output=$build_dir/${{ matrix.build_type }}
          if [[ -d $build_output/${{ matrix.build_type }} ]]; then
            build_output=$build_output/${{ matrix.build_type }}
          fi

          cp -v $build_output/onnxruntime.dll $dst_dir/lib
          cp -v $build_output/onnxruntime_providers_shared.dll $dst_dir/lib
          find "$build_output" -maxdepth 1 -type f \( -name "*.a" -o -name "*.lib" -o -name "*.exp" \) -exec cp -v {} $dst_dir/lib/ \;

          ls -lh $dst_dir/lib

          echo "copy headers"

          mkdir $dst_dir/include

          cp -v $src/include/*.h $dst_dir/include

          echo "copy other files"

          cp -v $src/GIT_COMMIT_ID $dst_dir/
          cp -v $src/LICENSE $dst_dir/
          cp -v $src/Privacy.md $dst_dir/
          cp -v $src/README.md $dst_dir/
          cp -v $src/ThirdPartyNotices.txt $dst_dir/
          cp -v $src/VERSION_NUMBER $dst_dir/

      - name: Upload artifact
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-win-x64-mingw-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}
          path: onnxruntime-win-x64-mingw-${{ matrix.build_type }}-${{ env.ONNXRUNTIME_VERSION }}

      - name: Upload v${{ env.ONNXRUNTIME_VERSION }}
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: "./*.tar.bz2"
          overwrite: true
          tag: v${{ env.ONNXRUNTIME_VERSION }}
